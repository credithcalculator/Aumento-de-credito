    <script>
        // ==============================================
        // CONFIGURACIÓN INICIAL
        // ==============================================
        
        let USERS_LIST = [
            { email: "admin@nukocapital.com", name: "Administrator", password: "YRAC26", role: "admin", soloLectura: false, icon: "👑", iconBg: "#d97706", isAdmin: true, canDelete: false },
            { email: "valeria.romero@nukocapital.com", name: "Valeria Romero", password: null, role: "auditor", soloLectura: true, icon: "👀", iconBg: "#16a34a", isAdmin: false, canDelete: true },
            { email: "yeimy.gaviria@nukocapital.com", name: "Yeimy Gaviria", password: "YEIMY2024", role: "user", soloLectura: false, icon: "👤", iconBg: "#2563eb", isAdmin: false, canDelete: true },
            { email: "andres.acosta@nukocapital.com", name: "Andres Acosta", password: "ANDRES2024", role: "user", soloLectura: false, icon: "👤", iconBg: "#2563eb", isAdmin: false, canDelete: true },
            { email: "roberto.morante@nukocapital.com", name: "Roberto Morante", password: "ROBERTO2024", role: "user", soloLectura: false, icon: "👤", iconBg: "#2563eb", isAdmin: false, canDelete: true }
        ];
        
        let brokers = [];
        let carriers = [];
        let history = [];
        let currentUser = null;
        let selectedUser = null;
        let pendingIncrease = null;
        
        // ==============================================
        // FUNCIONES DE ALMACENAMIENTO (localStorage)
        // ==============================================
        
        function saveAllData() {
            try {
                const fullData = {
                    brokers: brokers,
                    carriers: carriers,
                    history: history,
                    users: USERS_LIST,
                    lastBackup: new Date().toISOString(),
                    version: "1.0"
                };
                localStorage.setItem('nuko_full_data', JSON.stringify(fullData));
                localStorage.setItem('nuko_last_save', new Date().toISOString());
                document.getElementById('backupStatus').innerHTML = '📁 Datos guardados - ' + new Date().toLocaleTimeString();
                return true;
            } catch (error) {
                console.error('Error al guardar:', error);
                showToast('⚠️ Error al guardar datos. ¡Respalda manualmente!', 'warning');
                return false;
            }
        }
        
        function loadAllData() {
            try {
                const savedData = localStorage.getItem('nuko_full_data');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    brokers = data.brokers || [];
                    carriers = data.carriers || [];
                    history = data.history || [];
                    if (data.users) USERS_LIST = data.users;
                    const lastSave = localStorage.getItem('nuko_last_save');
                    document.getElementById('backupStatus').innerHTML = '📁 Datos cargados - ' + (lastSave ? new Date(lastSave).toLocaleString() : 'inicial');
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Error al cargar:', error);
                return false;
            }
        }
        
        function initializeDefaultData() {
            let needsSave = false;
            
            if (brokers.length === 0) {
                brokers = [
                    { id: 1, nombre: "DELTA DEDICATED LLC", mc: "704324", buyLimit: 5000 },
                    { id: 2, nombre: "1 SOLUTION LOGISTICS", mc: "157327", buyLimit: 0 },
                    { id: 3, nombre: "10-4 LOGISTICS LLC", mc: "27505", buyLimit: 15000 },
                    { id: 4, nombre: "1ST CHOICE FREIGHT LLC", mc: "1341565", buyLimit: 10000 },
                    { id: 5, nombre: "1ST CHOICE LOGISTICS LC", mc: "586997", buyLimit: 26000 }
                ];
                needsSave = true;
            }
            
            if (carriers.length === 0) {
                carriers = [
                    { id: 1, nombre: "042 FREIGHT LLC", buyLimit: 10000, openAR: 0, powerUnits: 1, fechaContrato: "2024-03-11", tipoContrato: "viejo" },
                    { id: 2, nombre: "1 HAUL INC", buyLimit: 5000, openAR: 0, powerUnits: 2, fechaContrato: "2021-08-27", tipoContrato: "viejo" },
                    { id: 3, nombre: "1STGEN LOGISTIC LLC", buyLimit: 25000, openAR: 0, powerUnits: 1, fechaContrato: "2025-11-26", tipoContrato: "nuevo" }
                ];
                needsSave = true;
            }
            
            if (needsSave) {
                saveAllData();
            }
        }
        
        // ==============================================
        // BACKUP Y RESTORE
        // ==============================================
        
        function backupData() {
            const fullData = {
                brokers: brokers,
                carriers: carriers,
                history: history,
                users: USERS_LIST,
                backupDate: new Date().toISOString(),
                version: "1.0",
                totalRecords: brokers.length + carriers.length + history.length
            };
            
            const dataStr = JSON.stringify(fullData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `nuko_backup_${new Date().toISOString().split('T')[0]}_${Date.now()}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast('✅ Respaldo creado exitosamente. GUARDA ESTE ARCHIVO EN UN LUGAR SEGURO', 'success');
        }
        
        function exportAllData() {
            backupData();
        }
        
        function restoreData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (confirm('⚠️ ADVERTENCIA: Esto reemplazará TODOS los datos actuales. ¿Estás seguro de continuar?')) {
                        if (data.brokers) brokers = data.brokers;
                        if (data.carriers) carriers = data.carriers;
                        if (data.history) history = data.history;
                        if (data.users) USERS_LIST = data.users;
                        
                        saveAllData();
                        
                        if (currentUser) {
                            renderBrokers();
                            renderCarriers();
                            renderHistory();
                            updateStats();
                        }
                        
                        showToast('✅ Datos restaurados exitosamente. ' + (data.totalRecords || '') + ' registros cargados', 'success');
                    }
                } catch (error) {
                    showToast('❌ Error al restaurar: archivo inválido o corrupto', 'error');
                }
                input.value = '';
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        function showBackupInfo() {
            alert(
                '📌 INFORMACIÓN IMPORTANTE:\n\n' +
                'Los datos se guardan en el almacenamiento local de tu navegador.\n\n' +
                '⚠️ SI BORRAS LAS COOKIES O DATOS DEL NAVEGADOR, ¡PERDERÁS TODA LA INFORMACIÓN!\n\n' +
                '✅ PARA EVITAR LA PÉRDIDA DE DATOS:\n' +
                '1. Usa el botón "💾 Respaldar Datos" regularmente\n' +
                '2. Guarda los archivos .json en un lugar seguro (Google Drive, USB, etc.)\n' +
                '3. Para restaurar, usa el botón "🔄 Restaurar Datos"\n\n' +
                '📁 También puedes exportar los datos a CSV desde cada sección.'
            );
        }
        
        function checkFirstTime() {
            const hasData = localStorage.getItem('nuko_full_data');
            if (!hasData) {
                setTimeout(() => {
                    showToast('💡 CONSEJO: Usa el botón "💾 Respaldar Datos" para guardar tu información de forma segura', 'warning');
                    document.getElementById('warningBanner').style.display = 'flex';
                }, 2000);
            } else {
                document.getElementById('warningBanner').style.display = 'flex';
            }
        }
        
        // ==============================================
        // FUNCIONES UTILITARIAS
        // ==============================================
        
        function formatNumber(num) { 
            if (isNaN(num)) num = 0; 
            return num.toLocaleString('es-CO'); 
        }
        
        function cleanNumber(valor) { 
            let num = parseFloat(valor); 
            return isNaN(num) ? 0 : num; 
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = `alert-toast alert-${type}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }
        
        function updateStats() {
            document.getElementById('statBrokers').textContent = formatNumber(brokers.length);
            document.getElementById('statCarriers').textContent = formatNumber(carriers.length);
            const totalLimit = [...brokers, ...carriers].reduce((s, i) => s + (i.buyLimit || 0), 0);
            document.getElementById('statTotalLimit').textContent = '$' + formatNumber(totalLimit);
            document.getElementById('statHistory').textContent = formatNumber(history.length);
            document.getElementById('featureBrokersCount').textContent = formatNumber(brokers.length) + ' records';
            document.getElementById('featureCarriersCount').textContent = formatNumber(carriers.length) + ' records';
            document.getElementById('featureHistoryCount').textContent = formatNumber(history.length) + ' records';
        }
        
        // ==============================================
        // 🔥 FUNCIÓN DE VALIDACIÓN MEJORADA PARA CARRIERS
        // ==============================================
        
        function validateCarrierLimit(powerUnits, tipoContrato, currentLimit, amount) {
            // Determinar el límite por unidad según el tipo de contrato
            const limitPerUnit = tipoContrato === 'nuevo' ? 30000 : 50000;
            const maxAllowed = powerUnits * limitPerUnit;
            const newLimit = currentLimit + amount;
            const availableSpace = maxAllowed - currentLimit;
            
            return {
                valid: newLimit <= maxAllowed,
                maxAllowed: maxAllowed,
                limitPerUnit: limitPerUnit,
                powerUnits: powerUnits,
                tipoContrato: tipoContrato,
                currentLimit: currentLimit,
                amount: amount,
                newLimit: newLimit,
                availableSpace: availableSpace
            };
        }
        
        function getCarrierLimitInfo(carrier) {
            const limitPerUnit = carrier.tipoContrato === 'nuevo' ? 30000 : 50000;
            const maxAllowed = (carrier.powerUnits || 1) * limitPerUnit;
            const currentLimit = carrier.buyLimit || 0;
            const availableSpace = maxAllowed - currentLimit;
            
            return {
                maxAllowed: maxAllowed,
                limitPerUnit: limitPerUnit,
                availableSpace: availableSpace,
                currentLimit: currentLimit,
                powerUnits: carrier.powerUnits || 1,
                tipoContrato: carrier.tipoContrato
            };
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ==============================================
        // USERS FUNCTIONS (igual que antes)
        // ==============================================
        
        function loadUsersList() {
            const container = document.getElementById('usersGrid');
            if (!container) return;
            container.innerHTML = '';
            for (const user of USERS_LIST) {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.style.borderTop = `4px solid ${user.iconBg}`;
                card.onclick = () => { selectedUser = user; if (user.password === null && user.email !== 'admin@nukocapital.com') loginUser(user); else showPasswordForm(user); };
                let badgeClass = user.role === 'admin' ? 'badge-admin' : (user.soloLectura ? 'badge-readonly' : 'badge-user');
                let badgeText = user.role === 'admin' ? 'Admin' : (user.soloLectura ? 'Read Only' : 'User');
                card.innerHTML = `${user.canDelete ? '<div class="delete-user" onclick="deleteUser(\'' + user.email + '\', event)">✖</div>' : ''}<div class="user-avatar" style="background: ${user.iconBg}; color: white;">${user.icon}</div><div class="user-name">${user.name}</div><div class="user-email">${user.email}</div><div class="user-badge ${badgeClass}">${badgeText}</div>`;
                container.appendChild(card);
            }
            const addCard = document.createElement('div');
            addCard.className = 'user-card add-user-card';
            addCard.onclick = () => openCreateUserModal();
            addCard.innerHTML = '<div class="user-avatar" style="background: #22c55e; color: white;">➕</div><div class="user-name">Create User</div><div class="user-email">Add new user</div>';
            container.appendChild(addCard);
        }
        
        function showPasswordForm(user) { selectedUser = user; document.getElementById('passwordForm').classList.remove('hidden'); document.getElementById('userPassword').focus(); }
        
        function loginUser(user) {
            currentUser = { name: user.name, email: user.email, role: user.role, soloLectura: user.soloLectura, isAdmin: user.role === 'admin', icon: user.icon, iconBg: user.iconBg, password: user.password };
            document.getElementById('dashboardUserName').textContent = currentUser.name;
            document.getElementById('dashboardUserEmail').textContent = currentUser.email;
            document.getElementById('dashboardAvatar').textContent = currentUser.icon;
            document.getElementById('dashboardAvatar').style.background = currentUser.iconBg;
            
            if (currentUser.soloLectura) {
                document.getElementById('changePasswordBtn').style.display = 'none';
            } else {
                document.getElementById('changePasswordBtn').style.display = 'inline-block';
            }
            
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            document.getElementById('brokerImportArea').style.display = currentUser.isAdmin ? 'block' : 'none';
            document.getElementById('carrierImportArea').style.display = currentUser.isAdmin ? 'block' : 'none';
            if (currentUser.soloLectura) {
                document.getElementById('brokerAddForm').style.display = 'none';
                document.getElementById('carrierAddForm').style.display = 'none';
            } else {
                document.getElementById('brokerAddForm').style.display = 'flex';
                document.getElementById('carrierAddForm').style.display = 'flex';
            }
            
            renderBrokers();
            renderCarriers();
            renderHistory();
            updateStats();
            switchSection('brokers');
            showToast('Bienvenido ' + currentUser.name, 'success');
        }
        
        function validatePassword() {
            const password = document.getElementById('userPassword').value;
            if (selectedUser && selectedUser.password === password) { loginUser(selectedUser); document.getElementById('passwordForm').classList.add('hidden'); }
            else { showToast('Contraseña incorrecta', 'error'); document.getElementById('userPassword').value = ''; }
        }
        
        function cancelPassword() { document.getElementById('passwordForm').classList.add('hidden'); selectedUser = null; }
        function logout() { if (confirm('Cerrar sesión?')) { currentUser = null; document.getElementById('loginContainer').style.display = 'block'; document.getElementById('dashboardContainer').style.display = 'none'; loadUsersList(); } }
        
        function openCreateUserModal() { document.getElementById('createUserModal').classList.remove('hidden'); }
        function closeCreateUserModal() { document.getElementById('createUserModal').classList.add('hidden'); }
        
        function createUser() {
            const name = document.getElementById('newUserName').value.trim();
            const email = document.getElementById('newUserEmail').value.trim().toLowerCase();
            const password = document.getElementById('newUserPassword').value;
            const confirm = document.getElementById('newUserConfirmPassword').value;
            const type = document.getElementById('newUserType').value;
            if (!name || !email) { showToast('Complete nombre y email', 'error'); return; }
            if (password !== confirm) { showToast('Las contraseñas no coinciden', 'error'); return; }
            if (USERS_LIST.some(u => u.email === email)) { showToast('Email ya existe', 'error'); return; }
            const newUser = { email, name, password: password || null, role: type === 'readonly' ? 'auditor' : 'user', soloLectura: type === 'readonly', icon: type === 'readonly' ? '👀' : '👤', iconBg: type === 'readonly' ? '#16a34a' : '#2563eb', isAdmin: false, canDelete: true };
            USERS_LIST.push(newUser);
            saveAllData();
            loadUsersList();
            closeCreateUserModal();
            showToast('Usuario ' + name + ' creado', 'success');
        }
        
        function deleteUser(email, event) {
            event.stopPropagation();
            if (currentUser && currentUser.email === email) { showToast('No puedes eliminarte', 'error'); return; }
            if (email === 'admin@nukocapital.com') { showToast('No se puede eliminar al admin', 'error'); return; }
            if (confirm('Eliminar usuario?')) {
                const index = USERS_LIST.findIndex(u => u.email === email);
                if (index !== -1) { USERS_LIST.splice(index, 1); saveAllData(); loadUsersList(); showToast('Usuario eliminado', 'success'); }
            }
        }
        
        function openChangePasswordModal() { document.getElementById('changePasswordModal').classList.remove('hidden'); }
        function closeChangePasswordModal() { document.getElementById('changePasswordModal').classList.add('hidden'); }
        
        function changePassword() {
            const currentPwd = document.getElementById('currentPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmNewPassword').value;
            if (currentUser.password !== null && currentUser.password !== currentPwd) { showToast('Contraseña actual incorrecta', 'error'); return; }
            if (!newPwd) { showToast('Ingrese nueva contraseña', 'error'); return; }
            if (newPwd !== confirmPwd) { showToast('Las contraseñas no coinciden', 'error'); return; }
            const userIndex = USERS_LIST.findIndex(u => u.email === currentUser.email);
            if (userIndex !== -1) { USERS_LIST[userIndex].password = newPwd; currentUser.password = newPwd; saveAllData(); closeChangePasswordModal(); showToast('Contraseña cambiada', 'success'); }
        }
        
        // ==============================================
        // BROKERS FUNCTIONS
        // ==============================================
        
        function renderBrokers() {
            const search = document.getElementById('brokerSearch')?.value.toLowerCase() || '';
            const filtered = brokers.filter(b => 
                b.nombre.toLowerCase().includes(search) || 
                (b.mc && b.mc.toLowerCase().includes(search))
            );
            const container = document.getElementById('brokersTable');
            
            if (!filtered.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">📭 No brokers</div>';
                return;
            }
            
            let html = '<table class="data-grid"><thead><tr>';
            html += '<th>Debtor Name</th>';
            html += '<th>MC Num</th>';
            html += '<th>Buy Limit</th>';
            if (!currentUser?.soloLectura) html += '<th>Actions</th>';
            html += '</tr></thead><tbody>';
            
            filtered.forEach((b) => {
                const buyLimit = b.buyLimit || 0;
                
                html += '<tr>';
                html += '<td><strong>' + escapeHtml(b.nombre) + '</strong></td>';
                html += '<td><code>' + escapeHtml(b.mc || '-') + '</code></td>';
                html += '<td><strong>$' + formatNumber(buyLimit) + '</strong></td>';
                
                if (!currentUser?.soloLectura) {
                    html += '<td><button class="btn btn-success btn-sm" onclick="openIncreaseModal(\'broker\', ' + b.id + ', \'' + escapeHtml(b.nombre).replace(/'/g, "\\'") + '\', ' + buyLimit + ')">➕ Increase</button> <button class="btn btn-danger btn-sm" onclick="deleteBroker(' + b.id + ')">🗑️</button></td>';
                }
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function filterBrokers() { renderBrokers(); }
        
        function addBroker() {
            if (currentUser?.soloLectura) { showToast('Sin permiso', 'error'); return; }
            
            const nombre = document.getElementById('newBrokerName').value.trim();
            const mc = document.getElementById('newBrokerMC').value.trim();
            const buyLimit = parseFloat(document.getElementById('newBrokerLimit').value);
            
            if (!nombre || !mc || isNaN(buyLimit)) {
                showToast('Complete nombre, MC y Buy Limit', 'error');
                return;
            }
            
            const newId = brokers.length > 0 ? Math.max(...brokers.map(b => b.id)) + 1 : 1;
            
            brokers.push({
                id: newId,
                nombre: nombre,
                mc: mc,
                buyLimit: buyLimit
            });
            
            document.getElementById('newBrokerName').value = '';
            document.getElementById('newBrokerMC').value = '';
            document.getElementById('newBrokerLimit').value = '';
            
            renderBrokers();
            updateStats();
            saveAllData();
            showToast('Broker "' + nombre + '" agregado', 'success');
        }
        
        function deleteBroker(id) {
            if (currentUser?.soloLectura) { showToast('Sin permiso', 'error'); return; }
            if (confirm('Eliminar broker?')) {
                const broker = brokers.find(b => b.id === id);
                brokers = brokers.filter(b => b.id !== id);
                renderBrokers();
                updateStats();
                saveAllData();
                showToast('Broker "' + broker.nombre + '" eliminado', 'success');
            }
        }
        
        // ==============================================
        // CARRIERS FUNCTIONS
        // ==============================================
        
        function renderCarriers() {
            const search = document.getElementById('carrierSearch')?.value.toLowerCase() || '';
            const filtered = carriers.filter(c => c.nombre.toLowerCase().includes(search));
            const container = document.getElementById('carriersTable');
            
            if (!filtered.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">📭 No carriers</div>';
                return;
            }
            
            let html = '<table class="data-grid"><thead><tr>';
            html += '<th>Name</th>';
            html += '<th>Buy Limit</th>';
            html += '<th>Open A/R</th>';
            html += '<th>Available</th>';
            html += '<th>Unidades de poder</th>';
            html += '<th>Límite Máximo</th>';
            html += '<th>Fecha de contrato</th>';
            if (!currentUser?.soloLectura) html += '<th>Actions</th>';
            html += '</tr></thead><tbody>';
            
            filtered.forEach((c) => {
                const buyLimit = c.buyLimit || 0;
                const openAR = c.openAR || 0;
                const available = buyLimit - openAR;
                const fecha = c.fechaContrato ? new Date(c.fechaContrato).toLocaleDateString('es-ES') : '-';
                const limitInfo = getCarrierLimitInfo(c);
                const maxLimit = limitInfo.maxAllowed;
                const isNearLimit = (maxLimit - buyLimit) < 5000;
                
                html += '<tr>';
                html += '<td><strong>' + escapeHtml(c.nombre) + '</strong></td>';
                html += '<td><strong>$' + formatNumber(buyLimit) + '</strong></td>';
                html += '<td>$' + formatNumber(openAR) + '</td>';
                html += '<td><strong>$' + formatNumber(available) + '</strong></td>';
                html += '<td>' + (c.powerUnits || 1) + '</td>';
                html += '<td style="' + (isNearLimit ? 'color:#d97706; font-weight:bold;' : '') + '">$' + formatNumber(maxLimit) + '</td>';
                html += '<td>' + fecha + '</td>';
                
                if (!currentUser?.soloLectura) {
                    html += '<td><button class="btn btn-success btn-sm" onclick="openIncreaseModal(\'carrier\', ' + c.id + ', \'' + escapeHtml(c.nombre).replace(/'/g, "\\'") + '\', ' + buyLimit + ', ' + (c.powerUnits || 1) + ', \'' + (c.tipoContrato || 'viejo') + '\')">➕ Increase</button> <button class="btn btn-danger btn-sm" onclick="deleteCarrier(' + c.id + ')">🗑️</button></td>';
                }
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function filterCarriers() { renderCarriers(); }
        
        function addCarrier() {
            if (currentUser?.soloLectura) { showToast('Sin permiso', 'error'); return; }
            
            const nombre = document.getElementById('newCarrierName').value.trim();
            const buyLimit = parseFloat(document.getElementById('newCarrierLimit').value);
            const openAR = parseFloat(document.getElementById('newCarrierAR').value) || 0;
            const powerUnits = parseFloat(document.getElementById('newCarrierUnits').value);
            const fechaContrato = document.getElementById('newCarrierDate').value;
            const tipoContrato = document.getElementById('newCarrierType').value;
            
            if (!nombre || isNaN(buyLimit) || isNaN(powerUnits) || powerUnits <= 0) {
                showToast('Complete nombre, Buy Limit y Unidades de poder', 'error');
                return;
            }
            
            const newId = carriers.length > 0 ? Math.max(...carriers.map(c => c.id)) + 1 : 1;
            
            carriers.push({
                id: newId,
                nombre: nombre,
                buyLimit: buyLimit,
                openAR: openAR,
                powerUnits: powerUnits,
                fechaContrato: fechaContrato || null,
                tipoContrato: tipoContrato
            });
            
            document.getElementById('newCarrierName').value = '';
            document.getElementById('newCarrierLimit').value = '';
            document.getElementById('newCarrierAR').value = '';
            document.getElementById('newCarrierUnits').value = '';
            document.getElementById('newCarrierDate').value = '';
            
            renderCarriers();
            updateStats();
            saveAllData();
            showToast('Carrier "' + nombre + '" agregado', 'success');
        }
        
        function deleteCarrier(id) {
            if (currentUser?.soloLectura) { showToast('Sin permiso', 'error'); return; }
            if (confirm('Eliminar carrier?')) {
                const carrier = carriers.find(c => c.id === id);
                carriers = carriers.filter(c => c.id !== id);
                renderCarriers();
                updateStats();
                saveAllData();
                showToast('Carrier "' + carrier.nombre + '" eliminado', 'success');
            }
        }
        
        // ==============================================
        // INCREASE FUNCTIONS - CON VALIDACIÓN MEJORADA
        // ==============================================
        
        function openIncreaseModal(type, id, name, currentLimit, powerUnits, tipoContrato) {
            if (currentUser?.soloLectura) { showToast('Sin permiso', 'error'); return; }
            pendingIncrease = { type, id, name, currentLimit, powerUnits, tipoContrato };
            document.getElementById('modalEntity').value = name;
            document.getElementById('modalCurrentLimit').value = '$' + formatNumber(currentLimit);
            document.getElementById('modalAmount').value = '';
            document.getElementById('modalReason').value = '';
            
            const container = document.getElementById('carrierFieldsContainer');
            const warningDiv = document.getElementById('modalWarning');
            
            if (type === 'carrier' && powerUnits && tipoContrato) {
                const limitPerUnit = tipoContrato === 'nuevo' ? 30000 : 50000;
                const maxAllowed = powerUnits * limitPerUnit;
                const availableSpace = maxAllowed - currentLimit;
                
                document.getElementById('modalPowerUnits').value = powerUnits;
                document.getElementById('modalContractType').value = tipoContrato === 'nuevo' ? 'New (30k/unit)' : 'Old (50k/unit)';
                document.getElementById('modalMaxLimit').value = '$' + formatNumber(maxAllowed);
                container.style.display = 'block';
                
                // Mostrar información de disponibilidad
                if (availableSpace <= 0) {
                    warningDiv.innerHTML = `⚠️ <strong>LÍMITE ALCANZADO</strong><br>Este Carrier ya ha alcanzado su límite máximo de ${formatNumber(maxAllowed)}.<br>No se pueden realizar más aumentos.`;
                    warningDiv.classList.remove('hidden');
                } else {
                    warningDiv.innerHTML = `📊 <strong>Disponible para aumentar:</strong> $${formatNumber(availableSpace)}<br>📌 <strong>Límite máximo:</strong> $${formatNumber(maxAllowed)} (${powerUnits} unidad(es) × ${limitPerUnit.toLocaleString()}/unidad)`;
                    warningDiv.classList.remove('hidden');
                    warningDiv.style.background = '#e0f2fe';
                    warningDiv.style.borderColor = '#0284c7';
                }
            } else {
                container.style.display = 'none';
                warningDiv.classList.add('hidden');
            }
            document.getElementById('increaseModal').classList.remove('hidden');
        }
        
        function closeModal() { 
            document.getElementById('increaseModal').classList.add('hidden'); 
            pendingIncrease = null; 
        }
        
        function applyIncrease() {
            if (!pendingIncrease) return;
            
            const amount = parseFloat(document.getElementById('modalAmount').value);
            const reason = document.getElementById('modalReason').value;
            
            if (!amount || amount <= 0) { 
                showToast('❌ Ingresa un monto válido mayor a 0', 'error'); 
                return; 
            }
            
            // VALIDACIÓN PARA CARRIERS
            if (pendingIncrease.type === 'carrier' && pendingIncrease.powerUnits && pendingIncrease.tipoContrato) {
                const validation = validateCarrierLimit(
                    pendingIncrease.powerUnits, 
                    pendingIncrease.tipoContrato, 
                    pendingIncrease.currentLimit, 
                    amount
                );
                
                // Si no es válido, mostrar mensaje claro y NO aplicar el aumento
                if (!validation.valid) {
                    const tipoTexto = validation.tipoContrato === 'nuevo' ? 'NUEVO (30k/unidad)' : 'VIEJO (50k/unidad)';
                    const mensajeError = `❌ NO SE PUEDE REALIZAR EL AUMENTO\n\n` +
                        `📊 Carrier: ${pendingIncrease.name}\n` +
                        `⚡ Unidades de poder: ${validation.powerUnits}\n` +
                        `📋 Tipo de contrato: ${tipoTexto}\n` +
                        `💰 Límite actual: $${formatNumber(validation.currentLimit)}\n` +
                        `📈 Monto solicitado: $${formatNumber(validation.amount)}\n` +
                        `🔝 Nuevo límite sería: $${formatNumber(validation.newLimit)}\n\n` +
                        `🚫 Límite máximo permitido: $${formatNumber(validation.maxAllowed)}\n` +
                        `📊 Espacio disponible: $${formatNumber(validation.availableSpace)}\n\n` +
                        `⚠️ El aumento excede el límite máximo por unidad de poder.\n` +
                        `Por favor, solicita un monto menor o ajusta las unidades de poder.`;
                    
                    showToast(mensajeError, 'error');
                    return; // SALIR SIN APLICAR EL AUMENTO
                }
            }
            
            // Si pasó la validación, aplicar el aumento
            const oldLimit = pendingIncrease.currentLimit;
            const newLimit = oldLimit + amount;
            
            if (pendingIncrease.type === 'broker') {
                const broker = brokers.find(b => b.id === pendingIncrease.id);
                if (broker) broker.buyLimit = newLimit;
            } else {
                const carrier = carriers.find(c => c.id === pendingIncrease.id);
                if (carrier) carrier.buyLimit = newLimit;
            }
            
            history.unshift({
                id: Date.now(),
                fecha: new Date().toISOString(),
                tipo: pendingIncrease.type,
                entidad: pendingIncrease.name,
                monto: amount,
                usuario: currentUser.email,
                motivo: reason || 'Sin motivo',
                limiteAnterior: oldLimit,
                limiteNuevo: newLimit
            });
            
            closeModal();
            if (pendingIncrease.type === 'broker') renderBrokers();
            else renderCarriers();
            renderHistory();
            updateStats();
            saveAllData();
            showToast(`✅ Aumento de $${formatNumber(amount)} aplicado a ${pendingIncrease.name}`, 'success');
        }
        
        // ==============================================
        // HISTORY FUNCTIONS
        // ==============================================
        
        function renderHistory() {
            const search = document.getElementById('historySearch')?.value.toLowerCase() || '';
            const filtered = history.filter(h => h.entidad.toLowerCase().includes(search) || h.usuario.toLowerCase().includes(search));
            const container = document.getElementById('historyList');
            if (!filtered.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">📭 Sin historial</div>';
                return;
            }
            let html = '';
            filtered.forEach(h => {
                const fecha = new Date(h.fecha).toLocaleString('es-ES');
                html += '<div class="history-entry"><div class="history-header"><span class="history-entity">' + (h.tipo === 'broker' ? '📊' : '🚛') + ' ' + escapeHtml(h.entidad) + '</span><span class="history-amount">+$' + formatNumber(h.monto) + '</span></div><div>$' + formatNumber(h.limiteAnterior) + ' → $' + formatNumber(h.limiteNuevo) + '</div><div class="history-detail">📅 ' + fecha + ' | 👤 ' + escapeHtml(h.usuario) + ' | 📝 ' + escapeHtml(h.motivo) + '</div></div>';
            });
            container.innerHTML = html;
        }
        
        function filterHistory() { renderHistory(); }
        
        function clearHistory() {
            if (currentUser?.soloLectura) { showToast('Sin permiso', 'error'); return; }
            if (confirm('Eliminar todo el historial?')) { history = []; renderHistory(); updateStats(); saveAllData(); showToast('Historial eliminado', 'success'); }
        }
        
        // ==============================================
        // EXPORT FUNCTIONS (CSV)
        // ==============================================
        
        function exportBrokersCSV() {
            let csvContent = "\uFEFFDebtor Name,MC Num,Buy Limit\n";
            brokers.forEach(b => {
                const nombre = b.nombre.replace(/"/g, '""');
                const mc = (b.mc || '').replace(/"/g, '""');
                csvContent += `"${nombre}","${mc}",${b.buyLimit || 0}\n`;
            });
            downloadCSV(csvContent, 'brokers_' + new Date().toISOString().split('T')[0] + '.csv');
            showToast(brokers.length + ' brokers exportados', 'success');
        }
        
        function exportCarriersCSV() {
            let csvContent = "\uFEFFName,Buy Limit,Open A/R,Available,Unidades de poder,Límite Máximo,Fecha de contrato,Tipo Contrato\n";
            carriers.forEach(c => {
                const nombre = c.nombre.replace(/"/g, '""');
                const buyLimit = c.buyLimit || 0;
                const openAR = c.openAR || 0;
                const available = buyLimit - openAR;
                const fecha = c.fechaContrato || '';
                const tipo = c.tipoContrato === 'nuevo' ? 'New (30k/unit)' : 'Old (50k/unit)';
                const limitInfo = getCarrierLimitInfo(c);
                csvContent += `"${nombre}",${buyLimit},${openAR},${available},${c.powerUnits || 1},${limitInfo.maxAllowed},"${fecha}","${tipo}"\n`;
            });
            downloadCSV(csvContent, 'carriers_' + new Date().toISOString().split('T')[0] + '.csv');
            showToast(carriers.length + ' carriers exportados', 'success');
        }
        
        function exportHistoryCSV() {
            let csvContent = "\uFEFFFecha,Tipo,Entidad,Monto,Usuario,Motivo,Limite Anterior,Limite Nuevo\n";
            history.forEach(h => {
                const fecha = new Date(h.fecha).toLocaleString('es-ES');
                const entidad = h.entidad.replace(/"/g, '""');
                const usuario = h.usuario.replace(/"/g, '""');
                const motivo = h.motivo.replace(/"/g, '""');
                csvContent += `"${fecha}","${h.tipo === 'broker' ? 'Broker' : 'Carrier'}","${entidad}",${h.monto},"${usuario}","${motivo}",${h.limiteAnterior},${h.limiteNuevo}\n`;
            });
            downloadCSV(csvContent, 'history_' + new Date().toISOString().split('T')[0] + '.csv');
            showToast(history.length + ' registros exportados', 'success');
        }
        
        function downloadCSV(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 100);
        }
        
        // ==============================================
        // IMPORT FUNCTIONS (CSV)
        // ==============================================
        
        function downloadBrokerTemplate() {
            const template = "\uFEFFDebtor Name,MC Num,Buy Limit\n\"Global Logistics\",\"MC123456\",50000\n\"Express Freight\",\"MC789012\",75000";
            downloadCSV(template, "brokers_template.csv");
            showToast('Plantilla descargada', 'info');
        }
        
        function importBrokersCSV(input) {
            if (!currentUser?.isAdmin) { 
                showToast('Solo administradores', 'error'); 
                input.value = '';
                return; 
            }
            
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const lines = e.target.result.split('\n');
                    let added = 0;
                    let updated = 0;
                    let errors = 0;
                    
                    let nextId = brokers.length > 0 ? Math.max(...brokers.map(b => b.id)) + 1 : 1;
                    
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;
                        
                        let parts = [];
                        let inQuotes = false;
                        let current = '';
                        for (let j = 0; j < line.length; j++) {
                            const char = line[j];
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                parts.push(current);
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        parts.push(current);
                        
                        parts = parts.map(p => p.trim().replace(/^"|"$/g, ''));
                        
                        if (parts.length >= 3) {
                            const nombre = parts[0];
                            const mc = parts[1];
                            const buyLimit = parseFloat(parts[2]);
                            
                            if (nombre && mc && !isNaN(buyLimit)) {
                                const existingIndex = brokers.findIndex(b => b.mc === mc);
                                
                                if (existingIndex !== -1) {
                                    brokers[existingIndex].nombre = nombre;
                                    brokers[existingIndex].buyLimit = buyLimit;
                                    updated++;
                                } else {
                                    brokers.push({ 
                                        id: nextId++, 
                                        nombre: nombre, 
                                        mc: mc, 
                                        buyLimit: buyLimit 
                                    });
                                    added++;
                                }
                            } else {
                                errors++;
                            }
                        } else {
                            errors++;
                        }
                    }
                    
                    if (added > 0 || updated > 0) {
                        saveAllData();
                        renderBrokers();
                        updateStats();
                        showToast(`✅ Importados: ${added} nuevos, ${updated} actualizados, ${errors} errores`, 'success');
                    } else {
                        showToast('No se importaron brokers. Verifica el formato del archivo.', 'warning');
                    }
                } catch (error) {
                    console.error(error);
                    showToast('Error al procesar el archivo', 'error');
                } finally {
                    input.value = '';
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        function downloadCarrierTemplate() {
            const template = "\uFEFFName,Buy Limit,Open A/R,Unidades de poder,Fecha de contrato\n\"042 FREIGHT LLC\",10000,0,1,2024-03-11";
            downloadCSV(template, "carriers_template.csv");
            showToast('Plantilla descargada', 'info');
        }
        
        function importCarriersCSV(input) {
            if (!currentUser?.isAdmin) { 
                showToast('Solo administradores', 'error'); 
                input.value = '';
                return; 
            }
            
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const lines = e.target.result.split('\n');
                    let added = 0;
                    let updated = 0;
                    let errors = 0;
                    
                    let nextId = carriers.length > 0 ? Math.max(...carriers.map(c => c.id)) + 1 : 1;
                    
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;
                        
                        let parts = [];
                        let inQuotes = false;
                        let current = '';
                        for (let j = 0; j < line.length; j++) {
                            const char = line[j];
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                parts.push(current);
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        parts.push(current);
                        
                        parts = parts.map(p => p.trim().replace(/^"|"$/g, ''));
                        
                        if (parts.length >= 5) {
                            const nombre = parts[0];
                            const buyLimit = parseFloat(parts[1]);
                            const openAR = parseFloat(parts[2]) || 0;
                            let powerUnits = parseFloat(parts[3]);
                            let fechaRaw = parts[4];
                            
                            if (isNaN(powerUnits) || powerUnits === 0) powerUnits = 1;
                            
                            let fechaContrato = null;
                            let tipoContrato = 'viejo';
                            
                            if (fechaRaw) {
                                const fechaObj = new Date(fechaRaw);
                                if (!isNaN(fechaObj.getTime())) {
                                    fechaContrato = fechaObj.toISOString().split('T')[0];
                                    if (fechaObj >= new Date('2024-07-01')) { 
                                        tipoContrato = 'nuevo'; 
                                    }
                                }
                            }
                            
                            if (nombre && !isNaN(buyLimit)) {
                                const existingIndex = carriers.findIndex(c => c.nombre === nombre);
                                
                                if (existingIndex !== -1) {
                                    carriers[existingIndex].buyLimit = buyLimit;
                                    carriers[existingIndex].openAR = openAR;
                                    carriers[existingIndex].powerUnits = powerUnits;
                                    carriers[existingIndex].fechaContrato = fechaContrato;
                                    carriers[existingIndex].tipoContrato = tipoContrato;
                                    updated++;
                                } else {
                                    carriers.push({ 
                                        id: nextId++, 
                                        nombre: nombre, 
                                        buyLimit: buyLimit, 
                                        openAR: openAR, 
                                        powerUnits: powerUnits, 
                                        fechaContrato: fechaContrato, 
                                        tipoContrato: tipoContrato 
                                    });
                                    added++;
                                }
                            } else {
                                errors++;
                            }
                        } else {
                            errors++;
                        }
                    }
                    
                    if (added > 0 || updated > 0) {
                        saveAllData();
                        renderCarriers();
                        updateStats();
                        showToast(`✅ Importados: ${added} nuevos, ${updated} actualizados, ${errors} errores`, 'success');
                    } else {
                        showToast('No se importaron carriers. Verifica el formato del archivo.', 'warning');
                    }
                } catch (error) {
                    console.error(error);
                    showToast('Error al procesar el archivo', 'error');
                } finally {
                    input.value = '';
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        function switchSection(section) {
            document.querySelectorAll('.feature-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
            if (section === 'brokers') { 
                document.getElementById('featureBrokers').classList.add('active'); 
                document.getElementById('brokersPanel').classList.add('active'); 
                renderBrokers(); 
            } else if (section === 'carriers') { 
                document.getElementById('featureCarriers').classList.add('active'); 
                document.getElementById('carriersPanel').classList.add('active'); 
                renderCarriers(); 
            } else if (section === 'history') { 
                document.getElementById('featureHistory').classList.add('active'); 
                document.getElementById('historyPanel').classList.add('active'); 
                renderHistory(); 
            }
        }
        
        // ==============================================
        // INICIALIZACIÓN
        // ==============================================
        
        const loaded = loadAllData();
        if (!loaded) {
            initializeDefaultData();
        }
        loadUsersList();
        checkFirstTime();
    </script>
