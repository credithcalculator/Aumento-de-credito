    <div class="refresh-indicator" id="refreshIndicator">

    <!-- ... TODO EL HTML IGUAL ... -->
    
    <script>
        // ==============================================
        // FUNCIÓN DE APLICAR AUMENTO MEJORADA
        // ==============================================
        function applyIncrease() {
            if (!pendingIncrease) return;
            if (currentUser && currentUser.soloLectura) { showToast('Read only users cannot increase limits', 'error'); return; }
            
            var amount = parseFloat(document.getElementById('modalAmount').value);
            var reason = document.getElementById('modalReason').value;
            
            if (!amount || amount <= 0) { 
                showToast('Enter a valid amount greater than 0', 'error'); 
                return; 
            }
            
            if (pendingIncrease.type === 'carrier' && pendingIncrease.powerUnits && pendingIncrease.tipoContrato) {
                var validation = validateCarrierLimit(
                    pendingIncrease.powerUnits, 
                    pendingIncrease.tipoContrato, 
                    pendingIncrease.currentLimit, 
                    amount,
                    (currentUser && currentUser.isAdmin) || false
                );
                
                if (!validation.valid && !validation.isAdminOverride) {
                    var tipoTexto = validation.tipoContrato === 'nuevo' ? 'NEW (30k/unit)' : 'OLD (50k/unit)';
                    var mensajeError = 'INCREASE NOT ALLOWED\n\n' +
                        'Carrier: ' + pendingIncrease.name + '\n' +
                        'Units: ' + validation.powerUnits + '\n' +
                        'Contract: ' + tipoTexto + '\n' +
                        'Current Limit: $' + formatNumber(validation.currentLimit) + '\n' +
                        'Requested Amount: $' + formatNumber(validation.amount) + '\n' +
                        'New Limit would be: $' + formatNumber(validation.newLimit) + '\n\n' +
                        'Maximum allowed limit: $' + formatNumber(validation.maxAllowed) + '\n' +
                        'Available space: $' + formatNumber(validation.availableSpace) + '\n\n' +
                        'The increase exceeds the maximum limit per power unit.\n' +
                        'Please request a smaller amount or contact the administrator.';
                    
                    showToast(mensajeError, 'error');
                    return;
                }
                
                if (validation.isAdminOverride && (pendingIncrease.currentLimit + amount) > validation.maxAllowed && validation.maxAllowed !== Infinity) {
                    var confirmMsg = confirm('ADMIN WARNING\n\n' +
                        'This Carrier has a maximum limit of $' + formatNumber(validation.maxAllowed) + ' based on its power units.\n' +
                        'The new limit would be $' + formatNumber(pendingIncrease.currentLimit + amount) + '.\n\n' +
                        'Are you sure you want to exceed the allowed limit?');
                    
                    if (!confirmMsg) {
                        return;
                    }
                    showToast('Increase applied by administrator exceeding the allowed limit', 'info');
                }
            }
            
            var oldLimit = pendingIncrease.currentLimit;
            var newLimit = oldLimit + amount;
            
            // Actualizar el array correspondiente
            if (pendingIncrease.type === 'broker') {
                for (var i = 0; i < brokers.length; i++) {
                    if (brokers[i].id === pendingIncrease.id) {
                        brokers[i].buyLimit = newLimit;
                        break;
                    }
                }
            } else {
                for (var i = 0; i < carriers.length; i++) {
                    if (carriers[i].id === pendingIncrease.id) {
                        carriers[i].buyLimit = newLimit;
                        break;
                    }
                }
            }
            
            // Agregar al historial
            history.unshift({
                id: Date.now(),
                fecha: new Date().toISOString(),
                tipo: pendingIncrease.type,
                entidad: pendingIncrease.name,
                monto: amount,
                usuario: currentUser.email + (currentUser.isAdmin ? ' (Admin)' : ''),
                motivo: reason || 'No reason',
                limiteAnterior: oldLimit,
                limiteNuevo: newLimit
            });
            
            // Cerrar modal
            closeModal();
            
            // ACTUALIZAR LA TABLA INMEDIATAMENTE SIN RECARGAR
            if (pendingIncrease.type === 'broker') {
                renderBrokers();  // Refresca la tabla de brokers
            } else {
                renderCarriers(); // Refresca la tabla de carriers
            }
            renderHistory();      // Refresca el historial
            updateStats();        // Refresca las estadísticas
            saveAllData();        // Guarda en localStorage
            
            // Mostrar indicador de actualización
            var indicator = document.getElementById('refreshIndicator');
            if (indicator) {
                indicator.style.display = 'block';
                setTimeout(function() {
                    indicator.style.display = 'none';
                }, 1500);
            }
            
            showToast('Increase of $' + formatNumber(amount) + ' applied to ' + pendingIncrease.name + '. New limit: $' + formatNumber(newLimit), 'success');
        }
        
        // ==============================================
        // FUNCIÓN DE AGREGAR BROKER MEJORADA
        // ==============================================
        function addBroker() {
            if (currentUser && currentUser.soloLectura) { showToast('No permission', 'error'); return; }
            
            var nombre = document.getElementById('newBrokerName').value.trim();
            var mc = document.getElementById('newBrokerMC').value.trim();
            var buyLimit = parseFloat(document.getElementById('newBrokerLimit').value);
            
            if (!nombre || !mc || isNaN(buyLimit)) {
                showToast('Complete name, MC and Buy Limit', 'error');
                return;
            }
            
            var newId = 1;
            if (brokers.length > 0) {
                var maxId = brokers[0].id;
                for (var i = 1; i < brokers.length; i++) {
                    if (brokers[i].id > maxId) maxId = brokers[i].id;
                }
                newId = maxId + 1;
            }
            
            brokers.push({
                id: newId,
                nombre: nombre,
                mc: mc,
                buyLimit: buyLimit
            });
            
            document.getElementById('newBrokerName').value = '';
            document.getElementById('newBrokerMC').value = '';
            document.getElementById('newBrokerLimit').value = '';
            
            renderBrokers();  // Actualizar tabla inmediatamente
            updateStats();    // Actualizar estadísticas
            saveAllData();    // Guardar
            
            // Mostrar indicador
            var indicator = document.getElementById('refreshIndicator');
            if (indicator) {
                indicator.style.display = 'block';
                setTimeout(function() { indicator.style.display = 'none'; }, 1000);
            }
            
            showToast('Broker "' + nombre + '" added with limit $' + formatNumber(buyLimit), 'success');
        }
        
        // ==============================================
        // FUNCIÓN DE ELIMINAR BROKER MEJORADA
        // ==============================================
        function deleteBroker(id) {
            if (currentUser && currentUser.soloLectura) { showToast('No permission', 'error'); return; }
            if (confirm('Delete broker?')) {
                var broker = null;
                var newBrokers = [];
                for (var i = 0; i < brokers.length; i++) {
                    if (brokers[i].id === id) {
                        broker = brokers[i];
                    } else {
                        newBrokers.push(brokers[i]);
                    }
                }
                brokers = newBrokers;
                renderBrokers();  // Actualizar tabla inmediatamente
                updateStats();    // Actualizar estadísticas
                saveAllData();    // Guardar
                
                // Mostrar indicador
                var indicator = document.getElementById('refreshIndicator');
                if (indicator) {
                    indicator.style.display = 'block';
                    setTimeout(function() { indicator.style.display = 'none'; }, 1000);
                }
                
                showToast('Broker "' + broker.nombre + '" deleted', 'success');
            }
        }
        
        // ==============================================
        // FUNCIÓN DE AGREGAR CARRIER MEJORADA
        // ==============================================
        function addCarrier() {
            if (currentUser && currentUser.soloLectura) { showToast('No permission', 'error'); return; }
            
            var nombre = document.getElementById('newCarrierName').value.trim();
            var buyLimit = parseFloat(document.getElementById('newCarrierLimit').value);
            var openAR = parseFloat(document.getElementById('newCarrierAR').value) || 0;
            var powerUnits = parseFloat(document.getElementById('newCarrierUnits').value);
            var fechaContrato = document.getElementById('newCarrierDate').value;
            var tipoContrato = document.getElementById('newCarrierType').value;
            
            if (!nombre || isNaN(buyLimit) || isNaN(powerUnits) || powerUnits <= 0) {
                showToast('Complete name, Buy Limit and Power Units', 'error');
                return;
            }
            
            var newId = 1;
            if (carriers.length > 0) {
                var maxId = carriers[0].id;
                for (var i = 1; i < carriers.length; i++) {
                    if (carriers[i].id > maxId) maxId = carriers[i].id;
                }
                newId = maxId + 1;
            }
            
            carriers.push({
                id: newId,
                nombre: nombre,
                buyLimit: buyLimit,
                openAR: openAR,
                powerUnits: powerUnits,
                fechaContrato: fechaContrato || null,
                tipoContrato: tipoContrato
            });
            
            document.getElementById('newCarrierName').value = '';
            document.getElementById('newCarrierLimit').value = '';
            document.getElementById('newCarrierAR').value = '';
            document.getElementById('newCarrierUnits').value = '';
            document.getElementById('newCarrierDate').value = '';
            
            renderCarriers();  // Actualizar tabla inmediatamente
            updateStats();     // Actualizar estadísticas
            saveAllData();     // Guardar
            
            var indicator = document.getElementById('refreshIndicator');
            if (indicator) {
                indicator.style.display = 'block';
                setTimeout(function() { indicator.style.display = 'none'; }, 1000);
            }
            
            showToast('Carrier "' + nombre + '" added with limit $' + formatNumber(buyLimit), 'success');
        }
        
        // ==============================================
        // FUNCIÓN DE ELIMINAR CARRIER MEJORADA
        // ==============================================
        function deleteCarrier(id) {
            if (currentUser && currentUser.soloLectura) { showToast('No permission', 'error'); return; }
            if (confirm('Delete carrier?')) {
                var carrier = null;
                var newCarriers = [];
                for (var i = 0; i < carriers.length; i++) {
                    if (carriers[i].id === id) {
                        carrier = carriers[i];
                    } else {
                        newCarriers.push(carriers[i]);
                    }
                }
                carriers = newCarriers;
                renderCarriers();  // Actualizar tabla inmediatamente
                updateStats();     // Actualizar estadísticas
                saveAllData();     // Guardar
                
                var indicator = document.getElementById('refreshIndicator');
                if (indicator) {
                    indicator.style.display = 'block';
                    setTimeout(function() { indicator.style.display = 'none'; }, 1000);
                }
                
                showToast('Carrier "' + carrier.nombre + '" deleted', 'success');
            }
        }
        
        // ==============================================
        // FUNCIÓN DE ELIMINAR TODOS LOS BROKERS
        // ==============================================
        function deleteAllBrokers() {
            if (!currentUser || !currentUser.isAdmin) {
                showToast('Only administrators can delete all brokers', 'error');
                return;
            }
            
            if (confirm('ARE YOU ABSOLUTELY SURE?\n\nThis will delete ALL brokers permanently.\nThis action CANNOT be undone.\n\nDo you want to continue?')) {
                var count = brokers.length;
                brokers = [];
                renderBrokers();   // Actualizar tabla inmediatamente
                updateStats();     // Actualizar estadísticas
                saveAllData();     // Guardar
                
                history.unshift({
                    id: Date.now(),
                    fecha: new Date().toISOString(),
                    tipo: 'admin_action',
                    entidad: 'SYSTEM',
                    monto: 0,
                    usuario: currentUser.email + ' (Admin)',
                    motivo: 'MASS DELETION: ' + count + ' brokers deleted',
                    limiteAnterior: 0,
                    limiteNuevo: 0
                });
                renderHistory();   // Actualizar historial
                
                var indicator = document.getElementById('refreshIndicator');
                if (indicator) {
                    indicator.style.display = 'block';
                    setTimeout(function() { indicator.style.display = 'none'; }, 1500);
                }
                
                showToast(count + ' brokers deleted permanently', 'success');
            }
        }
        
        // ==============================================
        // FUNCIÓN DE ELIMINAR TODOS LOS CARRIERS
        // ==============================================
        function deleteAllCarriers() {
            if (!currentUser || !currentUser.isAdmin) {
                showToast('Only administrators can delete all carriers', 'error');
                return;
            }
            
            if (confirm('ARE YOU ABSOLUTELY SURE?\n\nThis will delete ALL carriers permanently.\nThis action CANNOT be undone.\n\nDo you want to continue?')) {
                var count = carriers.length;
                carriers = [];
                renderCarriers();  // Actualizar tabla inmediatamente
                updateStats();     // Actualizar estadísticas
                saveAllData();     // Guardar
                
                history.unshift({
                    id: Date.now(),
                    fecha: new Date().toISOString(),
                    tipo: 'admin_action',
                    entidad: 'SYSTEM',
                    monto: 0,
                    usuario: currentUser.email + ' (Admin)',
                    motivo: 'MASS DELETION: ' + count + ' carriers deleted',
                    limiteAnterior: 0,
                    limiteNuevo: 0
                });
                renderHistory();   // Actualizar historial
                
                var indicator = document.getElementById('refreshIndicator');
                if (indicator) {
                    indicator.style.display = 'block';
                    setTimeout(function() { indicator.style.display = 'none'; }, 1500);
                }
                
                showToast(count + ' carriers deleted permanently', 'success');
            }
        }
        
        // ==============================================
        // FUNCIÓN DE ELIMINAR HISTORIAL
        // ==============================================
        function clearHistory() {
            if (currentUser && currentUser.soloLectura) { showToast('No permission', 'error'); return; }
            if (!currentUser || !currentUser.isAdmin) { showToast('Only administrators can clear history', 'error'); return; }
            if (confirm('Clear all history?')) { 
                history = []; 
                renderHistory();  // Actualizar historial inmediatamente
                updateStats();    // Actualizar estadísticas
                saveAllData();    // Guardar
                
                var indicator = document.getElementById('refreshIndicator');
                if (indicator) {
                    indicator.style.display = 'block';
                    setTimeout(function() { indicator.style.display = 'none'; }, 1000);
                }
                
                showToast('History cleared', 'success'); 
            }
        }
        
        // ==============================================
        // FUNCIÓN DE IMPORTAR BROKERS MEJORADA
        // ==============================================
        function importBrokersCSV(input) {
            if (!currentUser || !currentUser.isAdmin) { 
                showToast('Only administrators', 'error'); 
                input.value = '';
                return; 
            }
            
            var file = input.files[0];
            if (!file) return;
            
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var lines = e.target.result.split('\n');
                    var added = 0;
                    var updated = 0;
                    var errors = 0;
                    
                    var maxId = 0;
                    for (var i = 0; i < brokers.length; i++) {
                        if (brokers[i].id > maxId) maxId = brokers[i].id;
                    }
                    var nextId = maxId + 1;
                    
                    for (var i = 1; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (!line) continue;
                        
                        var parts = [];
                        var inQuotes = false;
                        var current = '';
                        for (var j = 0; j < line.length; j++) {
                            var char = line[j];
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                parts.push(current);
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        parts.push(current);
                        
                        parts = parts.map(function(p) { return p.trim().replace(/^"|"$/g, ''); });
                        
                        if (parts.length >= 3) {
                            var nombre = parts[0];
                            var mc = parts[1];
                            var buyLimit = parseFloat(parts[2]);
                            
                            if (nombre && mc && !isNaN(buyLimit)) {
                                var existingIndex = -1;
                                for (var j = 0; j < brokers.length; j++) {
                                    if (brokers[j].mc === mc) {
                                        existingIndex = j;
                                        break;
                                    }
                                }
                                
                                if (existingIndex !== -1) {
                                    brokers[existingIndex].nombre = nombre;
                                    brokers[existingIndex].buyLimit = buyLimit;
                                    updated++;
                                } else {
                                    brokers.push({ 
                                        id: nextId++, 
                                        nombre: nombre, 
                                        mc: mc, 
                                        buyLimit: buyLimit 
                                    });
                                    added++;
                                }
                            } else {
                                errors++;
                            }
                        } else {
                            errors++;
                        }
                    }
                    
                    if (added > 0 || updated > 0) {
                        saveAllData();
                        renderBrokers();   // Actualizar tabla inmediatamente
                        updateStats();     // Actualizar estadísticas
                        
                        var indicator = document.getElementById('refreshIndicator');
                        if (indicator) {
                            indicator.style.display = 'block';
                            setTimeout(function() { indicator.style.display = 'none'; }, 1500);
                        }
                        
                        showToast('Imported: ' + added + ' new, ' + updated + ' updated, ' + errors + ' errors', 'success');
                    } else {
                        showToast('No brokers imported. Check file format.', 'warning');
                    }
                } catch (error) {
                    console.error(error);
                    showToast('Error processing file', 'error');
                } finally {
                    input.value = '';
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        // ==============================================
        // FUNCIÓN DE IMPORTAR CARRIERS MEJORADA
        // ==============================================
        function importCarriersCSV(input) {
            if (!currentUser || !currentUser.isAdmin) { 
                showToast('Only administrators', 'error'); 
                input.value = '';
                return; 
            }
            
            var file = input.files[0];
            if (!file) return;
            
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var lines = e.target.result.split('\n');
                    var added = 0;
                    var updated = 0;
                    var errors = 0;
                    
                    var maxId = 0;
                    for (var i = 0; i < carriers.length; i++) {
                        if (carriers[i].id > maxId) maxId = carriers[i].id;
                    }
                    var nextId = maxId + 1;
                    
                    for (var i = 1; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (!line) continue;
                        
                        var parts = [];
                        var inQuotes = false;
                        var current = '';
                        for (var j = 0; j < line.length; j++) {
                            var char = line[j];
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                parts.push(current);
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        parts.push(current);
                        
                        parts = parts.map(function(p) { return p.trim().replace(/^"|"$/g, ''); });
                        
                        if (parts.length >= 5) {
                            var nombre = parts[0];
                            var buyLimit = parseFloat(parts[1]);
                            var openAR = parseFloat(parts[2]) || 0;
                            var powerUnits = parseFloat(parts[3]);
                            var fechaRaw = parts[4];
                            
                            if (isNaN(powerUnits) || powerUnits === 0) powerUnits = 1;
                            
                            var fechaContrato = null;
                            var tipoContrato = 'viejo';
                            
                            if (fechaRaw) {
                                var fechaObj = new Date(fechaRaw);
                                if (!isNaN(fechaObj.getTime())) {
                                    fechaContrato = fechaObj.toISOString().split('T')[0];
                                    if (fechaObj >= new Date('2024-07-01')) { 
                                        tipoContrato = 'nuevo'; 
                                    }
                                }
                            }
                            
                            if (nombre && !isNaN(buyLimit)) {
                                var existingIndex = -1;
                                for (var j = 0; j < carriers.length; j++) {
                                    if (carriers[j].nombre === nombre) {
                                        existingIndex = j;
                                        break;
                                    }
                                }
                                
                                if (existingIndex !== -1) {
                                    carriers[existingIndex].buyLimit = buyLimit;
                                    carriers[existingIndex].openAR = openAR;
                                    carriers[existingIndex].powerUnits = powerUnits;
                                    carriers[existingIndex].fechaContrato = fechaContrato;
                                    carriers[existingIndex].tipoContrato = tipoContrato;
                                    updated++;
                                } else {
                                    carriers.push({ 
                                        id: nextId++, 
                                        nombre: nombre, 
                                        buyLimit: buyLimit, 
                                        openAR: openAR, 
                                        powerUnits: powerUnits, 
                                        fechaContrato: fechaContrato, 
                                        tipoContrato: tipoContrato 
                                    });
                                    added++;
                                }
                            } else {
                                errors++;
                            }
                        } else {
                            errors++;
                        }
                    }
                    
                    if (added > 0 || updated > 0) {
                        saveAllData();
                        renderCarriers();  // Actualizar tabla inmediatamente
                        updateStats();     // Actualizar estadísticas
                        
                        var indicator = document.getElementById('refreshIndicator');
                        if (indicator) {
                            indicator.style.display = 'block';
                            setTimeout(function() { indicator.style.display = 'none'; }, 1500);
                        }
                        
                        showToast('Imported: ' + added + ' new, ' + updated + ' updated, ' + errors + ' errors', 'success');
                    } else {
                        showToast('No carriers imported. Check file format.', 'warning');
                    }
                } catch (error) {
                    console.error(error);
                    showToast('Error processing file', 'error');
                } finally {
                    input.value = '';
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
    </script>
</body>
