        .user-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }

        .add-user-card { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 2px dashed #22c55e; cursor: pointer; }
        .add-user-card:hover { background: linear-gradient(135deg, #dcfce7, #bbf7d0); transform: translateY(-5px); }
        .login-form { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .login-form.hidden { display: none; }
        .top-panel { background: #f1f5f9; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-bottom: 1px solid #e2e8f0; }
        .user-info-panel { display: flex; align-items: center; gap: 15px; }
        .user-avatar-sm { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .user-text h3 { font-size: 16px; color: #1e293b; }
        .user-text p { font-size: 12px; color: #64748b; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-logout:hover { background: #dc2626; transform: translateY(-2px); }
