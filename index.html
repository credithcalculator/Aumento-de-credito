<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuko Capital - Test</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-screen {
            padding: 40px;
            text-align: center;
        }
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .user-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            text-align: center;
            transition: all 0.3s;
        }
        .user-card:hover {
            transform: translateY(-5px);
            border-color: #2a5298;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 36px;
        }
        .user-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .user-email {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .user-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-admin { background: #fef3c7; color: #d97706; }
        .badge-user { background: #dbeafe; color: #2563eb; }
        .badge-readonly { background: #dcfce7; color: #16a34a; }
        .login-form {
            max-width: 400px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .login-form.hidden {
            display: none;
        }
        .search-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary {
            background: #1e3c72;
            color: white;
        }
        .hidden {
            display: none;
        }
        .dashboard {
            padding: 40px;
            text-align: center;
        }
        .btn-logout {
            background: #ef4444;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>Nuko Capital</h1>
            <p>Credit Limit Management System</p>
        </div>

        <!-- Pantalla de Login -->
        <div id="loginContainer">
            <div class="login-screen">
                <h2>System Access</h2>
                <div id="usersGrid" class="users-grid"></div>
                <div id="passwordForm" class="login-form hidden">
                    <h3>Enter your password</h3>
                    <input type="password" id="userPassword" class="search-input" placeholder="Password">
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-primary" onclick="validatePassword()">Validate</button>
                        <button class="btn" onclick="cancelPassword()">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard (oculto al inicio) -->
        <div id="dashboardContainer" style="display: none;">
            <div class="dashboard">
                <h2>Welcome to Dashboard</h2>
                <p id="welcomeUser"></p>
                <button class="btn btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // LISTA DE USUARIOS
        const USERS_LIST = [
            { email: "admin@nukocapital.com", name: "Administrator", password: "YRAC26", role: "admin", icon: "👑", iconBg: "#d97706" },
            { email: "valeria.romero@nukocapital.com", name: "Valeria Romero", password: null, role: "readonly", icon: "👀", iconBg: "#16a34a" },
            { email: "yeimy.gaviria@nukocapital.com", name: "Yeimy Gaviria", password: "YEIMY2024", role: "user", icon: "👤", iconBg: "#2563eb" },
            { email: "andres.acosta@nukocapital.com", name: "Andres Acosta", password: "ANDRES2024", role: "user", icon: "👤", iconBg: "#2563eb" },
            { email: "roberto.morante@nukocapital.com", name: "Roberto Morante", password: "ROBERTO2024", role: "user", icon: "👤", iconBg: "#2563eb" }
        ];
        
        let currentUser = null;
        let selectedUser = null;
        
        // Función para mostrar los usuarios
        function loadUsersList() {
            const container = document.getElementById('usersGrid');
            if (!container) {
                console.error('Container not found');
                return;
            }
            
            container.innerHTML = '';
            
            for (let i = 0; i < USERS_LIST.length; i++) {
                const user = USERS_LIST[i];
                
                // Determinar badge
                let badgeClass = '';
                let badgeText = '';
                if (user.role === 'admin') {
                    badgeClass = 'badge-admin';
                    badgeText = 'Admin';
                } else if (user.role === 'readonly') {
                    badgeClass = 'badge-readonly';
                    badgeText = 'Read Only';
                } else {
                    badgeClass = 'badge-user';
                    badgeText = 'User';
                }
                
                // Crear tarjeta
                const card = document.createElement('div');
                card.className = 'user-card';
                card.style.borderTop = '4px solid ' + user.iconBg;
                card.innerHTML = 
                    '<div class="user-avatar" style="background: ' + user.iconBg + '; color: white;">' + user.icon + '</div>' +
                    '<div class="user-name">' + user.name + '</div>' +
                    '<div class="user-email">' + user.email + '</div>' +
                    '<div class="user-badge ' + badgeClass + '">' + badgeText + '</div>';
                
                // Evento click
                card.onclick = (function(u) {
                    return function() {
                        selectedUser = u;
                        if (u.password === null) {
                            // Usuario sin contraseña (Valeria)
                            loginUser(u);
                        } else {
                            // Mostrar formulario de contraseña
                            document.getElementById('passwordForm').classList.remove('hidden');
                            document.getElementById('userPassword').focus();
                        }
                    };
                })(user);
                
                container.appendChild(card);
            }
            
            console.log('Usuarios cargados:', USERS_LIST.length);
        }
        
        function validatePassword() {
            const password = document.getElementById('userPassword').value;
            if (selectedUser && selectedUser.password === password) {
                loginUser(selectedUser);
                document.getElementById('passwordForm').classList.add('hidden');
                document.getElementById('userPassword').value = '';
            } else {
                alert('Contraseña incorrecta');
                document.getElementById('userPassword').value = '';
            }
        }
        
        function cancelPassword() {
            document.getElementById('passwordForm').classList.add('hidden');
            selectedUser = null;
            document.getElementById('userPassword').value = '';
        }
        
        function loginUser(user) {
            currentUser = user;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            document.getElementById('welcomeUser').innerHTML = 'Welcome ' + user.name + ' (' + user.role + ')';
        }
        
        function logout() {
            currentUser = null;
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('dashboardContainer').style.display = 'none';
        }
        
        // Inicializar cuando la página cargue
        window.onload = function() {
            console.log('Página cargada');
            loadUsersList();
        };
    </script>
</body>
</html>
